<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIEM Africa — {{ T.connexion }}</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-page">

<div class="login-container">
  <div class="login-logo">
    <span class="login-shield">🛡</span>
    <h1>SIEM Africa</h1>
    <p>{{ T.bienvenue }}</p>
  </div>

  <div class="lang-switch login-lang">
    <a href="?lang=fr" class="lang-btn {% if lang == 'fr' %}active{% endif %}">FR</a>
    <a href="?lang=en" class="lang-btn {% if lang == 'en' %}active{% endif %}">EN</a>
  </div>

  {% if erreur %}
  <div class="alert alert-danger">{{ erreur }}</div>
  {% endif %}

  <form method="post" class="login-form">
    {% csrf_token %}
    <input type="hidden" name="lang" value="{{ lang }}">

    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" class="form-control"
             autocomplete="email" autofocus required
             placeholder="admin@votre-entreprise.com">
    </div>

    <div class="form-group">
      <label>{% if lang == 'fr' %}Mot de passe{% else %}Password{% endif %}</label>
      <input type="password" name="password" class="form-control"
             autocomplete="current-password" required>
    </div>

    <button type="submit" class="btn btn-primary btn-full">
      {{ T.connexion }}
    </button>
  </form>

  <p class="login-footer">
    SIEM Africa v2.0 — Open Source<br>
    <small>github.com/luciesys/SIEM-AFRICA</small>
  </p>
</div>

</body>
</html>
