{% load static %}
<!DOCTYPE html>
<html lang="{{ langue|default:'fr' }}" data-theme="{{ theme|default:'dark' }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIEM Africa — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e1a; --card:#111827; --border:#2a3a5c;
  --text:#e8edf5; --muted:#8fa3c0; --accent:#3b82f6;
  --critique:#ef4444;
}
[data-theme="light"] { --bg:#f0f4f8; --card:#ffffff; --border:#e2e8f0; --text:#0f172a; --muted:#475569; }

* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family: 'Sora', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* Background pattern africain */
body::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(59,130,246,0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(139,92,246,0.08) 0%, transparent 50%);
  pointer-events: none;
}

.login-box {
  width: 100%; max-width: 400px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 2.5rem;
  position: relative;
  z-index: 1;
  box-shadow: 0 25px 50px rgba(0,0,0,0.5);
}

.login-logo {
  text-align: center;
  margin-bottom: 2rem;
}

.logo-icon {
  font-size: 3rem;
  display: block;
  margin-bottom: 0.75rem;
}

.logo-title {
  font-size: 1.5rem;
  font-weight: 700;
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.logo-sub {
  font-size: 0.7rem;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  margin-top: 0.25rem;
}

.form-group { margin-bottom: 1.25rem; }
.form-label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--muted); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.05em; }
.form-input {
  width: 100%; padding: 0.75rem 1rem;
  background: rgba(59,130,246,0.05);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 0.9rem;
  font-family: 'Sora', sans-serif;
  transition: all 0.2s;
}
.form-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
.form-input::placeholder { color: var(--muted); }

.btn-login {
  width: 100%;
  padding: 0.875rem;
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Sora', sans-serif;
  transition: all 0.2s;
  margin-top: 0.5rem;
  letter-spacing: 0.05em;
}
.btn-login:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 25px rgba(59,130,246,0.4); }
.btn-login:active { transform: translateY(0); }

.error-msg {
  background: rgba(239,68,68,0.12);
  border: 1px solid var(--critique);
  color: var(--critique);
  padding: 0.75rem 1rem;
  border-radius: 8px;
  font-size: 0.8rem;
  margin-bottom: 1rem;
  display: flex; align-items: center; gap: 0.5rem;
}

.login-footer {
  text-align: center;
  margin-top: 1.5rem;
  font-size: 0.65rem;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
}
</style>
</head>
<body>

<div class="login-box">
  <div class="login-logo">
    <span class="logo-icon">🛡️</span>
    <div class="logo-title">SIEM Africa</div>
    <div class="logo-sub">Security Information & Event Management</div>
  </div>

  {% if error %}
  <div class="error-msg">⚠️ {{ error }}</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label">{% if request.session.langue == 'en' %}Username{% else %}Nom d'utilisateur{% endif %}</label>
      <input type="text" name="username" class="form-input"
             placeholder="{% if request.session.langue == 'en' %}Enter your username{% else %}Entrez votre identifiant{% endif %}"
             autofocus autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">{% if request.session.langue == 'en' %}Password{% else %}Mot de passe{% endif %}</label>
      <input type="password" name="password" class="form-input"
             placeholder="••••••••••••"
             autocomplete="current-password">
    </div>
    <button type="submit" class="btn-login">
      {% if request.session.langue == 'en' %}Sign in{% else %}Se connecter{% endif %} →
    </button>
  </form>

  <div class="login-footer">
    SIEM Africa v3.0 — github.com/luciesys/SIEM-AFRICA
  </div>
</div>

</body>
</html>
